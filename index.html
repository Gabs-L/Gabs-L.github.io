  <style>
    /* Minimal CSS for dropdowns + sticky nav */
    .nav-dropdown { position: relative; }
    .nav-dropdown:hover .dropdown-menu { display: block; opacity: 1; transform: translateY(0); }
    .dropdown-menu {
      display: none; opacity: 0; transform: translateY(-8px);
      position: absolute; top: 100%; left: 0; 
      background: white; border: 1px solid #e5e7eb; border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); min-width: 180px;
      transition: all 0.2s ease; z-index: 1000;
      margin-top: 4px;
    }
    .dropdown-link { display: block; padding: 12px 16px; color: #374151; text-decoration: none; }
    .dropdown-link:hover { background: #f3f4f6; color: #2563eb; }
    
    /* Sticky nav styles */
    .sticky-nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
  </style>
</head>
